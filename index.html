<style>

.social-section{
width:100%;
padding:100px 10%;
text-align:center;
background:
linear-gradient(rgba(0,0,0,0.75),
rgba(0,0,0,0.75)),
url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1974&auto=format&fit=crop');
background-size:cover;
background-position:center;
background-attachment:fixed;
}

.social-section h2{
font-size:60px;
font-weight:800;
color:#7dff00;
margin-bottom:20px;
font-family:'Poppins',sans-serif;
}

.social-section p{
font-size:22px;
color:#ffffff;
max-width:850px;
margin:auto;
line-height:1.8;
margin-bottom:60px;
font-family:'Poppins',sans-serif;
}

.contact-links{
display:flex;
justify-content:center;
align-items:center;
gap:35px;
flex-wrap:wrap;
}

.social-btn{
min-width:280px;
padding:24px 40px;
border-radius:80px;
display:flex;
justify-content:center;
align-items:center;
gap:18px;
text-decoration:none;
font-size:28px;
font-weight:700;
color:white;
transition:0.4s ease;
position:relative;
overflow:hidden;
font-family:'Poppins',sans-serif;
box-shadow:0 12px 35px rgba(0,0,0,0.35);
}

.social-btn::before{
content:'';
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:rgba(255,255,255,0.15);
transition:0.5s;
}

.social-btn:hover::before{
left:100%;
}

.social-btn:hover{
transform:translateY(-10px) scale(1.05);
}

.social-btn i{
font-size:34px;
}

.facebook-btn{
background:linear-gradient(135deg,#1877f2,#0d47a1);
}

.facebook-btn:hover{
box-shadow:0 18px 45px rgba(24,119,242,0.5);
}

.whatsapp-btn{
background:linear-gradient(135deg,#25d366,#128c7e);
}

.whatsapp-btn:hover{
box-shadow:0 18px 45px rgba(37,211,102,0.5);
}

.email-btn{
background:linear-gradient(135deg,#ff6b00,#ff0000);
}

.email-btn:hover{
box-shadow:0 18px 45px rgba(255,80,0,0.5);
}

/* MOBILE */

@media(max-width:768px){

.social-section{
padding:80px 6%;
}

.social-section h2{
font-size:42px;
}

.social-section p{
font-size:18px;
}

.social-btn{
width:100%;
font-size:24px;
padding:22px;
}

}

</style>
